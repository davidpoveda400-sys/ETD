<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>¿Quién es el impostor?</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --forest:#405927;
  --forest-dark:#2f4019;
  --forest-mid:#4f6e32;
  --cream:#FAF3ED;
  --cream-dark:#f0e8e0;
  --cream-muted:rgba(250,243,237,.5);
  --cream-dim:rgba(250,243,237,.15);
  --cream-border:rgba(250,243,237,.12);
  --ink:#1a1a18;
  --ink2:#3d3d38;
  --muted:#7a7a6e;
  --border:#ddd6cc;
  --border-light:#e8e2da;
  --surface:#f2ece5;
  --white:#ffffff;
  --imp-bg:#261818;
  --imp-border:#4a2828;
  --imp-text:#c0a0a0;
  --imp-title:#eedada;
  --r:10px;
  --r-lg:14px;
}
html,body{min-height:100%;background:var(--cream);color:var(--ink);font-family:'DM Sans',system-ui,sans-serif;-webkit-font-smoothing:antialiased;}
body{display:flex;justify-content:center;padding:0 0 5rem;}
#app{width:100%;max-width:460px;}
.page-band{background:var(--forest);padding:2.5rem 1.25rem 2rem;}
.page-content{padding:1.5rem 1.25rem 0;}

h1{font-family:'Syne',sans-serif;font-size:27px;font-weight:800;line-height:1.05;margin-bottom:6px;color:var(--cream);}
h2{font-family:'Syne',sans-serif;font-size:20px;font-weight:700;line-height:1.1;margin-bottom:4px;}

/* buttons */
button{
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
  border:1px solid var(--border);border-radius:9999px;
  padding:11px 22px;font-size:14px;font-family:'DM Sans',sans-serif;font-weight:600;
  background:var(--cream);color:var(--ink);cursor:pointer;
  transition:all .15s;width:100%;letter-spacing:.01em;
}
button:hover:not(:disabled){background:var(--cream-dark);}
button:active:not(:disabled){transform:scale(.98);}
button:disabled{opacity:.28;cursor:not-allowed;}
button.ghost{background:rgba(0,0,0,.18);border-color:var(--cream-border);color:var(--cream-muted);}
button.ghost:hover:not(:disabled){background:rgba(0,0,0,.28);}
button.w-auto{width:auto;}
button.danger{background:#f5eaea;color:#7a2828;border-color:#ddb8b8;}

/* inputs */
input[type=text]{
  width:100%;border:1px solid var(--border);border-radius:var(--r);
  padding:11px 14px;font-size:15px;font-family:'DM Sans',sans-serif;
  background:var(--white);color:var(--ink);outline:none;
  transition:border-color .15s;
}
input[type=text]:focus{border-color:var(--forest);}

/* panel sobre fondo crema */
.panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:20px;margin-bottom:14px;}

/* cards sobre fondo claro */
.card{background:var(--white);border:1px solid var(--border-light);border-radius:var(--r-lg);padding:16px 20px;margin-bottom:12px;}
.card-cream{background:var(--cream);border:1px solid var(--border);border-radius:var(--r-lg);padding:18px 22px;margin-bottom:12px;}

/* pills */
.pill{display:inline-flex;align-items:center;gap:4px;border-radius:9999px;padding:3px 11px;font-size:12px;font-weight:600;letter-spacing:.02em;}
.pill-light{background:rgba(250,243,237,.18);color:var(--cream);border:1px solid rgba(250,243,237,.2);}
.pill-muted{background:var(--surface);color:var(--muted);border:1px solid var(--border);}
.pill-done{background:#dff0ce;color:#3b5e1a;}
.pill-pending{background:#f5efe5;color:#7a6630;}

/* layout helpers */
.row{display:flex;align-items:center;gap:8px;}
.row-sb{display:flex;align-items:center;justify-content:space-between;gap:8px;}
.flex1{flex:1;}
.label-up{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.09em;color:var(--muted);}
.label-light{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.09em;color:var(--cream-muted);}
.mb4{margin-bottom:4px;}
.mb8{margin-bottom:8px;}
.mb12{margin-bottom:12px;}
.mb16{margin-bottom:16px;}
.mb20{margin-bottom:20px;}
.mb24{margin-bottom:24px;}
.mt8{margin-top:8px;}
.mt16{margin-top:16px;}
.center{text-align:center;}

/* avatar */
.av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;}
.av-lg{width:46px;height:46px;font-size:16px;}

/* p-item */
.p-item{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border-light);}
.p-item:last-child{border-bottom:none;}

/* ronda selector */
.ronda-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px;}
.ronda-opt{background:var(--white);border:1px solid var(--border);border-radius:var(--r-lg);padding:18px 16px;cursor:pointer;transition:all .18s;text-align:left;}
.ronda-opt:hover{border-color:var(--border);background:var(--surface);}
.ronda-opt.sel{border:1.5px solid var(--forest);background:#edf5e3;}
.ronda-tag{font-size:11px;color:var(--muted);margin-bottom:5px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;}
.ronda-name{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;color:var(--ink);}

/* instruction steps */
.inst-row{display:flex;gap:12px;align-items:flex-start;padding:9px 0;border-bottom:1px solid var(--border-light);}
.inst-row:last-child{border-bottom:none;}
.inst-num{width:22px;height:22px;border-radius:50%;background:var(--forest);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:1px;color:var(--cream);}
.inst-txt{font-size:14px;line-height:1.55;color:var(--ink2);}

/* rol card */
.rol-card{border-radius:var(--r-lg);padding:28px 24px;text-align:center;margin-bottom:14px;}
.rol-ey{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.09em;margin-bottom:10px;}
.rol-word{font-family:'Syne',sans-serif;font-size:23px;font-weight:800;line-height:1.2;margin-bottom:10px;}
.rol-hint{font-size:13px;line-height:1.6;}
.rol-jugador{background:#e4efd8;border:1px solid #c0d9a0;}
.rol-impostor{background:var(--imp-bg);border:1px solid var(--imp-border);}

/* ocultar */
.ocultar-screen{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:36px 24px;text-align:center;margin-bottom:14px;}

/* cierre */
.concepto-hero{background:var(--forest);border-radius:var(--r-lg);padding:44px 28px;text-align:center;margin-bottom:16px;}

/* anims */
@keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.fade-up{animation:fadeUp .3s ease both;}
@keyframes pop{from{opacity:0;transform:scale(.94);}to{opacity:1;transform:scale(1);}}
.pop{animation:pop .35s cubic-bezier(.34,1.4,.64,1) both;}
</style>
</head>
<body>
<div id="app"></div>

<script>
const RONDAS = {
  1:{nombre:'Liderazgo Nivel 5',    def:'Un liderazgo que combina una profunda humildad personal con una enorme voluntad profesional. No busca protagonismo, pero sí resultados extraordinarios y sostenibles con su equipo.'},
  2:{nombre:'Paradoja de Stockdale',def:'La capacidad de mantener la fe en que se puede salir adelante, sin dejar de enfrentar con honestidad los hechos más duros de la realidad. No es optimismo tóxico; es una fe realista.'}
};

const PALETTE=[
  {bg:'#dff0ce',c:'#3b5e1a'},{bg:'#e8e4d9',c:'#4a4635'},
  {bg:'#d9ece8',c:'#235c50'},{bg:'#e8dfd9',c:'#5c3e2e'},
  {bg:'#dde4ee',c:'#2e4466'},{bg:'#e8e0d4',c:'#5c4e30'},
  {bg:'#d9e8e0',c:'#2e5c44'},{bg:'#e4dde8',c:'#4e3060'},
];

let S = {
  fase:'setup', ronda:1,
  participantes:[],
  turnoIdx:null, rolVisible:false,
  votos:{}, votando:null, votoTemp:null
};

function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function $(id){return document.getElementById(id);}

function render(){
  const app=$('app');
  const views={setup,registro,ronda,turno,cierre};
  app.innerHTML=views[S.fase]?views[S.fase]():'';
}

function setup(){return`
<div class="fade-up">
  <div class="page-band">
    <p class="label-light mb8">Dinámica de liderazgo</p>
    <h1>¿Quién es<br/>el impostor?</h1>
  </div>
  <div class="page-content">
    <div class="panel mb20">
      <p style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.09em;color:var(--muted);margin-bottom:12px;">Cómo funciona</p>
      <div class="inst-row"><div class="inst-num">1</div><div class="inst-txt">Elige la ronda y registra los nombres del grupo</div></div>
      <div class="inst-row"><div class="inst-num">2</div><div class="inst-txt">El sistema asigna en secreto quién es el impostor</div></div>
      <div class="inst-row"><div class="inst-num">3</div><div class="inst-txt">Cada persona se acerca sola y toca su nombre para ver su rol en privado</div></div>
      <div class="inst-row"><div class="inst-num">4</div><div class="inst-txt">Conversan sin revelar el concepto directamente</div></div>
      <div class="inst-row"><div class="inst-num">5</div><div class="inst-txt">Al final se revela el concepto y quién era el impostor</div></div>
    </div>
    <p style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.09em;color:var(--muted);margin-bottom:12px;">Selecciona la ronda</p>
    <div class="ronda-grid">
      <div class="ronda-opt${S.ronda===1?' sel':''}" onclick="setRonda(1)">
        <div class="ronda-tag">Ronda 1</div>
        <div class="ronda-name">Ronda 1</div>
      </div>
      <div class="ronda-opt${S.ronda===2?' sel':''}" onclick="setRonda(2)">
        <div class="ronda-tag">Ronda 2</div>
        <div class="ronda-name">Ronda 2</div>
      </div>
    </div>
    <button onclick="S.fase='registro';render()">Continuar &rarr;</button>
  </div>
</div>`;}

// ── REGISTRO ─────────────────────────────────────────────────────
function registro(){
  const ps=S.participantes;
  return`
<div class="fade-up">
  <div class="page-band row-sb" style="align-items:flex-end;">
    <div>
      <h2 style="color:var(--cream);">Participantes</h2>
      <p style="color:rgba(250,243,237,.5);font-size:13px;margin-top:3px;">Ronda ${S.ronda}</p>
    </div>
    <span class="pill pill-light">${ps.length} ${ps.length===1?'persona':'personas'}</span>
  </div>
  <div class="page-content">
    <div class="card mb12">
      <div class="row" style="gap:8px;">
        <input type="text" id="inp" placeholder="Nombre del participante" maxlength="24" autocomplete="off"
          onkeydown="if(event.key==='Enter')agregar()" style="flex:1;"/>
        <button class="w-auto" onclick="agregar()" style="padding:10px 18px;">+ Agregar</button>
      </div>
    </div>

    ${ps.length>0?`
    <div class="card" style="padding:4px 20px;">
      ${ps.map((p,i)=>`
      <div class="p-item">
        <div class="row" style="gap:10px;">
          <div class="av" style="background:${p.col.bg};color:${p.col.c};">${p.nombre.charAt(0).toUpperCase()}</div>
          <span style="font-size:15px;font-weight:600;">${esc(p.nombre)}</span>
        </div>
        <button class="w-auto danger" style="padding:5px 12px;font-size:12px;" onclick="quitar(${i})">✕</button>
      </div>`).join('')}
    </div>`:`
    <div style="border:1px dashed var(--border);border-radius:var(--r-lg);padding:24px;text-align:center;" class="mb12">
      <p style="color:var(--muted);font-size:14px;">Agrega al menos 3 personas para continuar</p>
    </div>`}

    <div class="row mt16" style="gap:8px;">
      <button class="w-auto" onclick="S.fase='setup';render()" style="padding:10px 18px;background:var(--surface);border-color:var(--border);color:var(--ink2);">&larr; Volver</button>
      <button class="flex1" style="background:var(--forest);color:var(--cream);border-color:var(--forest-dark);" onclick="iniciarRonda()" ${ps.length<3?'disabled':''}>
        Iniciar ronda &rarr;
      </button>
    </div>
  </div>
</div>`;}

// ── RONDA ────────────────────────────────────────────────────────
function ronda(){
  const ps=S.participantes;
  const pendientes=ps.filter(p=>!p.vioRol).length;
  return`
<div class="fade-up">
  <div class="page-band row-sb" style="align-items:flex-end;">
    <div>
      <h2 style="color:var(--cream);">Asignación de roles</h2>
      <p style="color:rgba(250,243,237,.5);font-size:13px;margin-top:3px;">Cada persona se acerca sola y toca su nombre</p>
    </div>
    <span class="pill pill-light">Ronda ${S.ronda}</span>
  </div>
  <div class="page-content">
    ${pendientes>0?`<p style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.09em;color:var(--muted);margin-bottom:10px;">${pendientes} ${pendientes===1?'persona pendiente':'personas pendientes'}</p>`:''}

    <div class="card" style="padding:4px 20px;margin-bottom:16px;">
      ${ps.map((p,i)=>`
      <div class="p-item">
        <div class="row" style="gap:10px;">
          <div class="av" style="background:${p.col.bg};color:${p.col.c};">${p.nombre.charAt(0).toUpperCase()}</div>
          <span style="font-size:15px;font-weight:600;">${esc(p.nombre)}</span>
        </div>
        ${p.vioRol
          ?`<span class="pill pill-done">Listo</span>`
          :`<button class="w-auto" onclick="verRol(${i})" style="padding:7px 16px;font-size:13px;">Ver mi rol</button>`
        }
      </div>`).join('')}
    </div>

    ${ps.every(p=>p.vioRol)
      ?`<button style="background:var(--forest);color:var(--cream);border-color:var(--forest-dark);" onclick="S.fase='cierre';render()">Ver el concepto &rarr;</button>`
      :`<p style="color:var(--muted);font-size:13px;text-align:center;margin-top:4px;">Espera a que todos hayan visto su rol</p>`
    }
  </div>
</div>`;}

// ── CIERRE ───────────────────────────────────────────────────────
function cierre(){
  const r=RONDAS[S.ronda];
  return`
<div class="fade-up">
  <div class="concepto-hero pop">
    <p class="label-light mb16">Concepto de la ronda</p>
    <h1 style="font-size:30px;line-height:1.1;">${esc(r.nombre)}</h1>
  </div>
  <div style="padding:0 1.25rem;">
    <div class="card-cream mb20">
      <p style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.09em;color:var(--muted);margin-bottom:10px;">Definición</p>
      <p style="font-size:15px;line-height:1.78;color:var(--ink2);">${esc(r.def)}</p>
    </div>
    ${S.ronda===1
      ?`<button style="background:var(--forest);color:var(--cream);border-color:var(--forest-dark);" onclick="pasarARonda2()">Continuar a Ronda 2 &rarr;</button>`
      :`<button style="background:var(--forest);color:var(--cream);border-color:var(--forest-dark);" onclick="resetear()">Jugar de nuevo</button>`
    }
  </div>
</div>`;}

// ── TURNO ────────────────────────────────────────────────────────
function turno(){
  const p=S.participantes[S.turnoIdx];
  const esImp=p.rol==='impostor';
  return`
<div class="fade-up">
  <div class="page-band center">
    <p style="color:rgba(250,243,237,.5);font-size:13px;margin-bottom:12px;">Viendo rol de</p>
    <div class="row" style="justify-content:center;gap:10px;">
      <div class="av av-lg" style="background:${p.col.bg};color:${p.col.c};">${p.nombre.charAt(0).toUpperCase()}</div>
      <span style="font-family:'Syne',sans-serif;font-size:21px;font-weight:700;color:var(--cream);">${esc(p.nombre)}</span>
    </div>
  </div>
  <div class="page-content">
  ${!S.rolVisible?`
  <div class="ocultar-screen mb12">
    <p style="font-size:15px;font-weight:600;margin-bottom:6px;color:var(--ink);">Asegúrate de que solo</p>
    <p style="font-size:15px;margin-bottom:24px;color:var(--muted);"><strong style="color:var(--ink);">${esc(p.nombre)}</strong> esté mirando la pantalla</p>
    <button class="w-auto" onclick="S.rolVisible=true;render()" style="padding:11px 28px;">Mostrar mi rol</button>
  </div>
  `:`
  <div class="rol-card pop ${esImp?'rol-impostor':'rol-jugador'}" style="margin-bottom:14px;">
    <div class="rol-ey" style="color:${esImp?'var(--imp-text)':'#56783a'};">Tu rol en esta ronda</div>
    <div class="rol-word" style="color:${esImp?'var(--imp-title)':'#2a4d14'};">${esImp?'El impostor':esc(RONDAS[S.ronda].nombre)}</div>
    <div class="rol-hint" style="color:${esImp?'var(--imp-text)':'#4a6828'};">
      ${esImp
        ?'No conoces el concepto del grupo. Escucha con atención y evita que te descubran.'
        :'Habla sobre este concepto sin decirlo directamente. Ayuda al grupo a descubrir al impostor.'
      }
    </div>
  </div>
  <button onclick="ocultarYSiguiente()" style="${esImp?'background:var(--imp-bg);border-color:var(--imp-border);color:var(--imp-title);':'background:var(--forest);color:var(--cream);border-color:var(--forest-dark);'}">Entendido — ocultar pantalla</button>
  `}
  </div>
</div>`;}

// ── ACCIONES ─────────────────────────────────────────────────────
function setRonda(n){S.ronda=n;render();}

function agregar(){
  const inp=$('inp'); if(!inp) return;
  const nombre=inp.value.trim(); if(!nombre) return;
  if(S.participantes.find(p=>p.nombre.toLowerCase()===nombre.toLowerCase())){inp.value='';return;}
  const col=PALETTE[S.participantes.length%PALETTE.length];
  S.participantes.push({nombre,col,rol:null,vioRol:false});
  inp.value=''; render();
  setTimeout(()=>{const i=$('inp');if(i)i.focus();},40);
}

function quitar(i){S.participantes.splice(i,1);render();}

function iniciarRonda(){
  const ps=S.participantes; if(ps.length<3) return;
  // Excluir al impostor de la ronda anterior para garantizar que cambie
  const candidatos=ps.map((_,i)=>i).filter(i=>ps[i].nombre!==S.impostorAnterior);
  const elegibles=candidatos.length>0?candidatos:ps.map((_,i)=>i);
  const idx=elegibles[Math.floor(Math.random()*elegibles.length)];
  ps.forEach((p,i)=>{p.rol=i===idx?'impostor':'jugador';p.vioRol=false;});
  S.fase='ronda'; render();
}

function verRol(i){S.turnoIdx=i;S.rolVisible=false;S.fase='turno';render();}

function ocultarYSiguiente(){
  S.participantes[S.turnoIdx].vioRol=true;
  S.rolVisible=false; S.fase='ronda'; render();
}

function pasarARonda2(){
  const nombresR1=S.participantes.map(p=>p.nombre);
  const impostorR1=S.participantes.find(p=>p.rol==='impostor')?.nombre||null;
  S={fase:'registro',ronda:2,participantes:[],turnoIdx:null,rolVisible:false,votos:{},votando:null,votoTemp:null,impostorAnterior:impostorR1};
  nombresR1.forEach(nombre=>{
    const col=PALETTE[S.participantes.length%PALETTE.length];
    S.participantes.push({nombre,col,rol:null,vioRol:false});
  });
  render();
}

function resetear(){
  S={fase:'setup',ronda:1,participantes:[],turnoIdx:null,rolVisible:false,votos:{},votando:null,votoTemp:null};
  render();
}

render();
</script>
</body>
</html>
